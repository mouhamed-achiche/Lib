name: Security Audit

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security audit daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  security-audit:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        directory: [backend, frontend]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: ${{ matrix.directory }}/package-lock.json
    
    - name: Install dependencies
      working-directory: ./${{ matrix.directory }}
      run: npm ci
    
    - name: Run npm audit
      working-directory: ./${{ matrix.directory }}
      run: npm audit --audit-level=moderate
      continue-on-error: true
    
    - name: Check for vulnerabilities
      working-directory: ./${{ matrix.directory }}
      run: |
        echo "Checking for vulnerabilities..."
        npm audit --json > audit-report.json || true
        
        # Parse the audit report
        if [ -f audit-report.json ]; then
          VULN_COUNT=$(node -e "const report = require('./audit-report.json'); console.log(report.metadata ? report.metadata.vulnerabilities.total : 0)")
          echo "Total vulnerabilities found: $VULN_COUNT"
          
          if [ "$VULN_COUNT" -gt 0 ]; then
            echo "::warning::Found $VULN_COUNT vulnerabilities"
            npm audit
          fi
        fi
    
    - name: Upload audit report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: audit-report-${{ matrix.directory }}
        path: ${{ matrix.directory }}/audit-report.json
        retention-days: 30
